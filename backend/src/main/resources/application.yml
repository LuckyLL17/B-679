server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        max-age: 1800

spring:
  application:
    name: campus-system
  datasource:
    url: jdbc:postgresql://localhost:5432/campus_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  session:
    timeout: 30m

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO

app:
  admin:
    username: admin
    password: admin123
