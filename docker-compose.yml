version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: campus-postgres
    environment:
      POSTGRES_DB: campus_db
      POSTGRES_PASSWORD: password
      TZ: Asia/Shanghai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: campus-backend
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/campus_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_PROFILES_ACTIVE: dev
      TZ: Asia/Shanghai
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: campus-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
